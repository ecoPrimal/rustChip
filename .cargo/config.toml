[build]
# Ensure we get useful backtraces in release builds
rustflags = ["-C", "force-frame-pointers=yes"]

[target.x86_64-unknown-linux-gnu]
rustflags = [
    "-C", "target-cpu=native",       # exploit host CPU features (AVX2, etc.)
    "-C", "force-frame-pointers=yes",
]

[alias]
# Convenience aliases
enumerate   = "run --bin enumerate --"
bench-all   = "run --bin akida-bench --"
check-all   = "clippy --workspace --all-targets --all-features -- -D warnings"
